    pagesEl.placeholder = pfx === 'f' ? 'e.g. 336' : 'e.g. 256';
    pagesEl.classList.remove('pages-loading');
    pageFetchState[tab] = null;
    document.getElementById(pfx + '-owned').checked = false;
    const genreEl = document.getElementById(pfx + '-genre');
    if (genreEl) genreEl.value = '';
    const authorEl2 = document.getElementById(pfx + '-author');
    if (authorEl2) authorEl2.dataset.userEdited = '';
    justAddedId = newBook.id;
    render(tab);
    justAddedId = null;
    sbUpsert(newBook, tab);
  }

  function deleteBook(btn) {
    const { id, tab } = btn.dataset;
    // Animate out then remove
    const tr = document.querySelector(`tr[data-book-id="${id}"]`);
    const card = document.querySelector(`.book-card[data-book-id="${id}"]`);
    function doDelete() {
      saveBooks(tab, loadBooks(tab).filter(b => b.id !== id));
      render(tab);
      sbDelete(id);
    }
    if (tr) {
      tr.classList.add('tr-exit');
      setTimeout(doDelete, 160);
    } else if (card) {
      card.classList.add('card-exit');
      setTimeout(doDelete, 160);
    } else {
      doDelete();
    }
  }

  function changeStatus(select) {
    const { id, tab } = select.dataset;
    const books = loadBooks(tab);
    const book = books.find(b => b.id === id);
    if (!book) return;
    book.status = select.value;
    if (book.status === 'Finished') {
      book.dateFinished = book.dateFinished || today();
      triggerConfetti();
    } else {
      book.dateFinished = '';
    }
    saveBooks(tab, books);
    render(tab);
    sbUpsert(book, tab);
  }

  function updatePagesRead(input) {
    const { id, tab } = input.dataset;
    const books = loadBooks(tab);
    const book = books.find(b => b.id === id);
    if (!book) return;
    const val = Math.max(0, Math.min(Number(input.value) || 0, Number(book.pages) || 99999));
    book.pagesRead = val;
    saveBooks(tab, books);
    sbUpsertDebounced(book, tab, 'pr_' + id);
    // Patch DOM without re-render to preserve focus
    const row = input.closest('tr');
    if (row) {
      const pct = book.pages ? Math.min(100, Math.round(val / Number(book.pages) * 100)) : 0;
      const fill  = row.querySelector('.progress-bar-fill');
      const label = row.querySelector('.progress-label');
      if (fill)  fill.style.width = pct + '%';
      if (label) label.textContent = `${val} / ${book.pages || '?'} pages — ${pct}%`;
    }
    renderStats(tab, loadBooks(tab));
  }

  function toggleOwned(checkbox) {
    const { id, tab } = checkbox.dataset;
    const books = loadBooks(tab);
    const book = books.find(b => b.id === id);
    if (!book) return;
    book.owned = checkbox.checked;
    saveBooks(tab, books);
    checkbox.title = book.owned ? 'Owned' : 'Not owned';
    sbUpsert(book, tab);
  }

  function updateDate(input) {
    const { id, tab } = input.dataset;
    const books = loadBooks(tab);
    const book = books.find(b => b.id === id);
    if (!book) return;
    book.dateFinished = input.value;
    saveBooks(tab, books);
    renderYearStats();
    sbUpsert(book, tab);
  }

  function handleSort(tab, col) {
    const state = loadSortState(tab);
    if (col === 'status') {
      // Toggle the primary status sort direction; leave secondary unchanged
      state.statusDir = (state.statusDir || 'asc') === 'asc' ? 'desc' : 'asc';
    } else {
      // Set or toggle secondary sort; leave status direction unchanged
      state.dir = state.col === col ? (state.dir === 'asc' ? 'desc' : 'asc') : 'asc';
      state.col = col;
    }
    saveSortState(tab, state);
    render(tab);
  }

  function handleSearch(tab, val) {
    searchQuery[tab] = val;
    render(tab);
  }

  /* ---- AUTHOR AUTOFILL ---- */
  async function autofillAuthor(tab) {
    const pfx = tab === 'fiction' ? 'f' : 'nf';
    const titleEl  = document.getElementById(pfx + '-title');
    const authorEl = document.getElementById(pfx + '-author');
    if (!authorEl || authorEl.dataset.userEdited === 'true') return;
    if (authorEl.value.trim()) return;
    const title = titleEl.value.trim();
    if (!title) return;
    authorEl.placeholder = 'Searching…';
    try {
      const res  = await fetch(`https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&fields=author_name&limit=1`);
      const data = await res.json();
      const author = data.docs && data.docs[0] && data.docs[0].author_name && data.docs[0].author_name[0];
      if (author && !authorEl.value.trim() && authorEl.dataset.userEdited !== 'true') {
        authorEl.value = author;
        authorEl.style.borderColor = 'var(--accent-dark)';
        setTimeout(() => { authorEl.style.borderColor = ''; }, 1500);
      } else {
        authorEl.placeholder = 'Author name';
      }
    } catch {
      authorEl.placeholder = 'Author name';
    }
  }

  // Mark author field as user-edited so autofill stops overwriting it
  // (script runs after DOM is ready, so getElementById works directly)
  function _bindAuthorEdited() {
    ['f-author', 'nf-author'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.addEventListener('input', () => {
        el.dataset.userEdited = el.value.trim() ? 'true' : '';
      });
    });
  }

  /* ---- PAGE AUTOFILL ---- */
  async function autofillPages(tab) {
    const pfx = tab === 'fiction' ? 'f' : 'nf';
    const titleEl = document.getElementById(pfx + '-title');
    const authorEl = document.getElementById(pfx + '-author');
    const pagesEl  = document.getElementById(pfx + '-pages');

    const title  = titleEl.value.trim();
    const author = authorEl.value.trim();

    // Need both fields; don't overwrite a value the user already typed
    if (!title || !author || pagesEl.value) return;

    const combo = title + '||' + author;
    if (pageFetchState[tab] === combo) return; // already fetched this exact pair
    pageFetchState[tab] = combo;

    pagesEl.placeholder = 'Fetching…';
    pagesEl.classList.add('pages-loading');
    pagesEl.disabled = true;

    try {
      const url = `https://openlibrary.org/search.json?title=${encodeURIComponent(title)}&author=${encodeURIComponent(author)}&fields=number_of_pages_median&limit=1`;
      const res  = await fetch(url);
      const data = await res.json();
      const pages = data.docs && data.docs[0] && data.docs[0].number_of_pages_median;
      if (pages && pages > 0) {
        pagesEl.value = pages;
        pagesEl.placeholder = pfx === 'f' ? 'e.g. 336' : 'e.g. 256';
      } else {
        pagesEl.placeholder = 'Not found — enter manually';
      }
    } catch {
      pagesEl.placeholder = 'Not found — enter manually';
    } finally {
      pagesEl.disabled = false;
      pagesEl.classList.remove('pages-loading');
    }
  }

  /* ---- STAR RATING ---- */
  function setRating(btn) {
    const { id, tab } = btn.dataset;
    const star = Number(btn.dataset.star);
    const books = loadBooks(tab);
    const book = books.find(b => b.id === id);
    if (!book) return;
    book.rating = (book.rating === star) ? 0 : star;
    saveBooks(tab, books);
    sbUpsert(book, tab);
    // Patch stars inline — no full re-render needed
    const stars = btn.closest('.star-row').querySelectorAll('.star-btn');
    stars.forEach((s, i) => s.classList.toggle('filled', book.rating >= i + 1));
  }

  /* ---- SUMMARY ---- */
  function buildSummaryRow(book, tab) {
    const s = activeSummary;
    let inner;
    if (s.status === 'loading') {
      inner = `<div class="summary-loading"><div class="spinner"></div>Fetching summary…</div>`;
    } else if (s.status === 'done') {
      inner = `<div class="summary-panel"><span class="summary-panel-icon">📖</span><span>${esc(s.text)}</span></div>`;
    } else {
      const grUrl = 'https://www.goodreads.com/search?q=' + encodeURIComponent((book.title + ' ' + book.author).trim());
      inner = `<div class="summary-panel"><span class="summary-panel-icon">🔍</span><span class="summary-notfound">No summary found — try searching <a href="${grUrl}" target="_blank" rel="noopener noreferrer">Goodreads</a>.</span></div>`;
    }
    return `<tr class="summary-row"><td colspan="10">${inner}</td></tr>`;
  }

  function toggleSummary(btn) {
    const { id, tab } = btn.dataset;
    if (activeSummary && activeSummary.id === id) {
      activeSummary = null;
      render(tab);
      return;
    }
    const cached = getSummaryCache(id);
    if (cached !== undefined) {
      activeSummary = { id, tab, status: cached ? 'done' : 'notfound', text: cached };
      render(tab);
    } else {
      activeSummary = { id, tab, status: 'loading' };
      render(tab);
      fetchSummary(id, tab);
    }
  }

  async function fetchSummary(id, tab) {
    const book = loadBooks(tab).find(b => b.id === id);
    if (!book) return;
    try {
      const url = `https://openlibrary.org/search.json?title=${encodeURIComponent(book.title)}&author=${encodeURIComponent(book.author || '')}&fields=key,first_sentence&limit=3`;
      const res = await fetch(url);
      const data = await res.json();
      let summary = null;

      // Pass 1: first_sentence from search results
      for (const doc of (data.docs || [])) {
        const fs = doc.first_sentence;
        if (fs && (typeof fs === 'string' ? fs : fs.value)) {
          summary = typeof fs === 'string' ? fs : fs.value;
          break;
        }
      }

      // Pass 2: fetch work description if no first_sentence
      if (!summary && data.docs && data.docs[0] && data.docs[0].key) {
        try {
          const workRes = await fetch(`https://openlibrary.org${data.docs[0].key}.json`);
          const work = await workRes.json();
          if (work.description) {
            summary = typeof work.description === 'string' ? work.description : (work.description.value || null);
          }
        } catch {}
      }

      setSummaryCache(id, summary || '');
      if (activeSummary && activeSummary.id === id && activeSummary.tab === tab) {
        activeSummary = { id, tab, status: summary ? 'done' : 'notfound', text: summary || '' };
        render(tab);
      }
    } catch {
      if (activeSummary && activeSummary.id === id && activeSummary.tab === tab) {
        activeSummary = { id, tab, status: 'notfound' };
        render(tab);
      }
    }
  }


  /* ---- EXPORT / IMPORT (migration) ---- */
  function exportData() {
    const payload = { version: 1, exported: new Date().toISOString(), data: {} };
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (key && key.startsWith('tbr')) payload.data[key] = localStorage.getItem(key);
    }
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'tbr-backup.json';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a); URL.revokeObjectURL(url);
  }

  async function importData(file) {
    if (!file) return;
    const text = await file.text();
    let entries;
    try {
      const payload = JSON.parse(text);
      entries = payload.data || payload;
      if (typeof entries !== 'object' || Array.isArray(entries)) throw new Error();
    } catch {
      alert('Import failed — not a valid TBR backup.');
      return;
    }

    const allBooks = [];
    for (const [key, val] of Object.entries(entries)) {
      if (key !== 'tbr_fiction' && key !== 'tbr_nonfiction') continue;
      const tab = key === 'tbr_fiction' ? 'fiction' : 'nonfiction';
      try {
        const books = JSON.parse(val);
        if (Array.isArray(books)) books.forEach(b => allBooks.push({ book: b, tab }));
      } catch {}
    }

    if (!allBooks.length) { alert('No books found in backup.'); return; }

    setSyncStatus('loading');
    let failed = 0;
    for (const { book, tab } of allBooks) {
      try {
        const res = await fetch(`${SB_URL}/rest/v1/books`, {
          method: 'POST',
          headers: sbHeaders({ 'Prefer': 'resolution=merge-duplicates,return=minimal' }),
          body: JSON.stringify(toDb(book, tab)),
        });
        if (!res.ok) failed++;
      } catch { failed++; }
    }

    if (failed === 0) {
      setSyncStatus('ok');
      alert(`✓ Imported ${allBooks.length} books into Supabase.`);
    } else {
      setSyncStatus('error');
      alert(`Imported ${allBooks.length - failed} of ${allBooks.length} books. ${failed} failed.`);
    }

    // Reload from Supabase and re-render
    await sbLoadAll();
    render('fiction');
    render('nonfiction');
  }

  /* ---- COVER CACHE ---- */
  function getCoverCache(id) {
    const val = localStorage.getItem(COVER_PREFIX + id);
    if (val === null) return null;   // not yet fetched
    return val;                       // coverId string or 'none'
  }
  function setCoverCache(id, val) {
    try { localStorage.setItem(COVER_PREFIX + id, val); } catch(e) {}
  }
  async function fetchCoverAsync(bookId, title, author) {
    if (coverFetchPending.has(bookId)) return;
    if (getCoverCache(bookId) !== null) return;
    coverFetchPending.add(bookId);
    try {
      const q = encodeURIComponent((title + ' ' + (author || '')).trim());
      const res = await fetch(`https://openlibrary.org/search.json?q=${q}&limit=1&fields=cover_i`);
      const data = await res.json();
      const coverId = data.docs && data.docs[0] && data.docs[0].cover_i ? String(data.docs[0].cover_i) : 'none';
      setCoverCache(bookId, coverId);
      // Patch DOM if element still present
      const el = document.getElementById('cover-' + bookId);
      if (el) {
        if (coverId !== 'none') {
          el.innerHTML = `<img src="https://covers.openlibrary.org/b/id/${coverId}-S.jpg" alt="" style="width:34px;height:48px;object-fit:cover;border-radius:3px;display:block;">`;
          el.classList.remove('cover-placeholder');
        }
      }
    } catch(e) {
      setCoverCache(bookId, 'none');
    } finally {
      coverFetchPending.delete(bookId);
    }
  }

  /* ---- GOAL BAR ---- */
  function renderGoalBar() {
    const el = document.getElementById('goal-bar');
    if (!el) return;
    const year = new Date().getFullYear();
    const goal = parseInt(localStorage.getItem(GOAL_KEY + year)) || 0;
    // Count finished across both tabs this year
    const allBooks = [...loadBooks('fiction'), ...loadBooks('nonfiction')];
    const finished = allBooks.filter(b => b.status === 'Finished' && (b.dateFinished || '').startsWith(String(year))).length;
    if (!goal) {
      el.innerHTML = `<div class="goal-bar-empty"><button class="btn-genre" onclick="promptGoal()">+ Set ${year} reading goal</button></div>`;
      return;
    }
    const pct = Math.min(100, Math.round((finished / goal) * 100));
    const done = finished >= goal;
    el.innerHTML = `
      <div class="goal-bar-wrap${done ? ' goal-done' : ''}">
        <div class="goal-bar-label">
          <span>${year} Reading Goal</span>
          <span>${finished} / <span class="goal-target" onclick="editGoal(${year})" title="Edit goal">${goal}</span> books${done ? ' 🎉' : ''}</span>
        </div>
        <div class="goal-bar-track"><div class="goal-bar-fill" style="width:${pct}%"></div></div>
      </div>`;
  }
  function promptGoal() {
    const year = new Date().getFullYear();
    const cur = localStorage.getItem(GOAL_KEY + year) || '';
    const val = prompt(`Set your ${year} reading goal (number of books):`, cur);
    if (val === null) return;
    const n = parseInt(val);
    if (n > 0) { localStorage.setItem(GOAL_KEY + year, String(n)); renderGoalBar(); }
    else if (val.trim() === '' || n === 0) { localStorage.removeItem(GOAL_KEY + year); renderGoalBar(); }
  }
  function editGoal(year) {
    const cur = localStorage.getItem(GOAL_KEY + year) || '';
    const val = prompt(`Edit your ${year} reading goal:`, cur);
    if (val === null) return;
    const n = parseInt(val);
    if (n > 0) { localStorage.setItem(GOAL_KEY + year, String(n)); renderGoalBar(); }
    else if (val.trim() === '' || n === 0) { localStorage.removeItem(GOAL_KEY + year); renderGoalBar(); }
  }

  /* ---- CONFETTI ---- */
  function triggerConfetti() {
    const canvas = document.createElement('canvas');
    canvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;';
    document.body.appendChild(canvas);
    const ctx = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;
    const colors = ['#E8006A','#FF2D78','#D45080','#FF6EB4','#FFB3D1','#C0005A','#FF85C2','#fff'];
    const pieces = Array.from({length: 80}, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height * -0.5 - 10,
      r: 4 + Math.random() * 6,
      d: 2 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      tilt: Math.random() * 10 - 5,
      tiltAngle: 0,
      tiltSpeed: 0.08 + Math.random() * 0.07
    }));
    const start = performance.now();
    const duration = 2200;
    function frame(now) {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const elapsed = now - start;
      const fade = Math.max(0, 1 - (elapsed - 1600) / 600);
      ctx.globalAlpha = fade;
      pieces.forEach(p => {
        p.y += p.d;
        p.tiltAngle += p.tiltSpeed;
        p.tilt = Math.sin(p.tiltAngle) * 12;
        ctx.beginPath();
        ctx.ellipse(p.x + p.tilt, p.y, p.r * 0.5, p.r, p.tiltAngle, 0, Math.PI * 2);
        ctx.fillStyle = p.color;
        ctx.fill();
        if (p.y > canvas.height) { p.y = -10; p.x = Math.random() * canvas.width; }
      });
      if (elapsed < duration) requestAnimationFrame(frame);
      else canvas.remove();
    }
    requestAnimationFrame(frame);
  }

  /* ---- RANDOM PICK ---- */
  function pickRandom(tab) {
    const books = loadBooks(tab).filter(b => b.status === 'Not Started');
    if (!books.length) { showPickBanner(tab, null); return; }
    const picked = books[Math.floor(Math.random() * books.length)];
    randomPickId[tab] = picked.id;
    render(tab);
    showPickBanner(tab, picked.title);
    // Scroll picked row into view
    const el = document.querySelector(`tr[data-book-id="${picked.id}"], .book-card[data-book-id="${picked.id}"]`);
    if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }
  function showPickBanner(tab, title) {
    const el = document.getElementById('pick-banner-' + tab);
    if (!el) return;
    if (!title) {
      el.innerHTML = '<div class="pick-banner">No unread books to pick from!</div>';
    } else {
      el.innerHTML = `<div class="pick-banner">🎲 Random pick: <strong>${esc(title)}</strong></div>`;
    }
    setTimeout(() => { if (el) el.innerHTML = ''; }, 4000);
  }

  /* ---- GENRE FILTER ---- */
  function renderGenreFilter(tab) {
    const el = document.getElementById('genre-filter-' + tab);
    if (!el) return;
    const books = loadBooks(tab);
    const genres = [...new Set(books.map(b => b.genre).filter(Boolean))].sort();
    if (!genres.length) { el.innerHTML = ''; return; }
    const cur = genreFilter[tab];
    const btns = genres.map(g =>
      `<button class="btn-genre${cur === g ? ' btn-genre-active' : ''}" onclick="setGenreFilter('${tab}','${g.replace(/'/g,"\\'")}'">${esc(g)}</button>`
    ).join('');
    el.innerHTML = `<div class="genre-filter-bar"><span class="genre-filter-label">Genre:</span>${btns}<button class="btn-genre${!cur ? ' btn-genre-active' : ''}" onclick="setGenreFilter('${tab}',null)">All</button></div>`;
  }
  function setGenreFilter(tab, genre) {
    genreFilter[tab] = genre || null;
    render(tab);
  }

  /* ---- NOTES ---- */
  function toggleNotes(btn) {
    const { id, tab } = btn.dataset;
    if (activeNotes && activeNotes.id === id && activeNotes.tab === tab) {
      activeNotes = null;
    } else {
      activeNotes = { id, tab };
    }
    render(tab);
  }
  function buildNotesRow(b, tab) {
    const notes = (b.notes || '').replace(/"/g, '&quot;');
    return `<tr class="notes-row"><td colspan="10"><div class="notes-wrap">
      <textarea class="notes-textarea" placeholder="Add notes…" oninput="saveNote(this)" data-id="${b.id}" data-tab="${tab}">${notes}</textarea>
    </div></td></tr>`;
  }
  function saveNote(textarea) {
    const { id, tab } = textarea.dataset;
    const books = loadBooks(tab);
    const book = books.find(b => b.id === id);
    if (!book) return;
    book.notes = textarea.value;
    saveBooks(tab, books);
    sbUpsertDebounced(book, tab, 'note_' + id);
  }

  /* ---- RESIZE HANDLER ---- */
  let _resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => {
      render('fiction');
      render('nonfiction');
    }, 200);
  });

  /* ---- INIT ---- */
  _bindAuthorEdited();
  async function init() {
    // Render from local cache immediately so the UI isn't blank
    render('fiction');
    render('nonfiction');
    // Then fetch from Supabase and re-render with fresh data
    setSyncStatus('loading');
    const ok = await sbLoadAll();
    if (ok) {
      render('fiction');
      render('nonfiction');
    }
  }
  init();
</script>
